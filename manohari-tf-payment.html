<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Payment - Simple Shop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="manohari-tf-style.css">
</head>
<body>
  <header>
    <div class="brand">
      <div class="brand-mark">S</div>
      <div>
        <p class="brand-title">Simple Shop</p>
        <p class="brand-subtitle">Checkout</p>
      </div>
    </div>
    <div class="nav-actions">
      <a class="button-link" href="manohari-tf-index.html">Home</a>
      <a class="button-link" href="manohari-tf-products.html">Products</a>
      <a class="button-link" href="manohari-tf-cart.html">Cart</a>
    </div>
  </header>
  <main>
    <section class="hero">
      <h1>Complete checkout</h1>
      <p>Confirm your order total and pay securely in one step.</p>
      <div style="margin-top: 16px;">
        <label for="apiVersion">API Version: </label>
        <select id="apiVersion" onchange="changeVersion()">
          <option value="v1">v1</option>
          <option value="v2">v2</option>
        </select>
      </div>
    </section>

    <section class="card">
      <h2>Payment summary</h2>
      <div id="paymentSummary" class="payment-box">
        <p>Loading your cart total...</p>
      </div>
      <button class="checkout-btn" id="payButton" onclick="checkout()">Pay now</button>
      <div id="paymentResult" style="margin-top: 18px;"></div>
    </section>
  </main>
  <div class="footer">© 2026 Simple Shop</div>

  <script>
    const USER_ID = 'user1'; // Hardcoded user ID for demo
    const urls = {
      cart: "https://kqprjormee.execute-api.ap-southeast-1.amazonaws.com/dev/cart",
      pay: "https://kqprjormee.execute-api.ap-southeast-1.amazonaws.com/dev/pay"
    };
    let currentVersion = 'v1';

    function changeVersion() {
      currentVersion = document.getElementById('apiVersion').value;
      loadCartTotal(); // Reload total with new version
    }

    function loadCartTotal() {
      fetch(`${urls.cart}?userId=${USER_ID}`, {
        headers: {
          'Api-Version': currentVersion
        }
      })
        .then(res => res.json())
        .then(data => {
          const cart = data.body ? JSON.parse(data.body) : data;
          currentTotal = cart.reduce((sum, item) => sum + item.total_price, 0);
          document.getElementById('paymentSummary').innerHTML = cart.length
            ? `
              <h4>Order total</h4>
              <div class="payment-row">
                <span>Items</span>
                <strong>${cart.length}</strong>
              </div>
              <div class="payment-row">
                <span>Total amount</span>
                <strong>₹${currentTotal}</strong>
              </div>`
            : '<p>Your cart is empty. Add items before paying.</p>';
          document.getElementById('payButton').disabled = currentTotal === 0;
        })
        .catch(() => {
          document.getElementById('paymentSummary').innerHTML = '<p>Unable to load cart total.</p>';
          document.getElementById('payButton').disabled = true;
        });
    }

    function checkout() {
      if (currentTotal === 0) {
        alert('Your cart is empty. Add items first.');
        return;
      }

      fetch(urls.pay, {
        method: 'POST',
        headers: { 
          'Content-Type': 'application/json',
          'Api-Version': currentVersion
       
        },
        body: JSON.stringify({ user: USER_ID, amount: currentTotal })
      })
        .then(res => res.json())
        .then(data => {
          document.getElementById('paymentResult').innerHTML = `
            <div class="payment-box">
              <h4>Payment successful</h4>
              <p>Your payment has been processed.</p>
              <p><strong>Payment ID:</strong> ${data.payment_id || data.body?.payment_id || 'N/A'}</p>
            </div>`;
          loadCartTotal();
        })
        .catch(() => {
          document.getElementById('paymentResult').innerHTML = '<p>Payment failed. Please try again.</p>';
        });
    }

    window.addEventListener('DOMContentLoaded', () => {
      document.getElementById('apiVersion').value = currentVersion;
      loadCartTotal();
    });
  </script>
</body>
</html>
