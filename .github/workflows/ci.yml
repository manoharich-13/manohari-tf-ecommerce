name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: '3.11'

jobs:

  # =========================
  # Code Quality
  # =========================
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: |
          pip install flake8 black isort pylint
          black --check . || true
          isort --check-only . || true
          flake8 . || true
          pylint **/*.py --exit-zero

  # =========================
  # Security Scan
  # =========================
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: |
          pip install bandit safety
          bandit -r . || true
          safety check || true

  # =========================
  # Backend Tests (All Services)
  # =========================
  backend-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - auth
          - cart
          - payment
          - product

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: |
          pip install pytest pytest-cov moto boto3
          pytest tests/test_${{ matrix.service }}.py -v

  # =========================
  # Frontend Validation
  # =========================
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # HTML validation
      - name: Validate HTML
        run: |
          npm install -g htmlhint
          htmlhint "*.html"

      # JS check (basic)
      - name: Check JavaScript
        run: |
          npm install -g eslint
          eslint . || true

      # CSS check
      - name: Check CSS
        run: |
          npm install -g stylelint stylelint-config-standard
          stylelint "**/*.css" || true

  # =========================
  # Build Lambda Packages
  # =========================
  build:
    runs-on: ubuntu-latest
    needs: backend-tests
    strategy:
      matrix:
        service:
          - auth_service
          - cart_service
          - payment_service
          - product_service

    steps:
      - uses: actions/checkout@v4

      - name: Build Package
        run: |
          mkdir build && cd build
          pip install -r ../requirements.txt -t .
          cp -r ../manohari_tf_${{ matrix.service }}/* .
          zip -r ../${{ matrix.service }}.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}
          path: ${{ matrix.service }}.zip