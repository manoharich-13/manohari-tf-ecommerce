name: CI Pipeline

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:

  # =========================
  # Code Quality
  # =========================
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: |
          pip install flake8 black isort pylint
          black --check . || true
          isort --check-only . || true
          flake8 . || true
          pylint **/*.py --exit-zero

  # =========================
  # Backend Tests
  # =========================
  backend-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth, cart, payment, product]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov moto boto3

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$PWD" >> $GITHUB_ENV

      - name: Run tests
        run: |
          pytest manohari-tf-tests/unit/test_${{ matrix.service }}.py -v

  # =========================
  # Frontend Validation
  # =========================
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate HTML
        run: |
          npm install -g htmlhint
          htmlhint "frontend/*.html"

      - name: Check CSS
        run: |
          npm install -g stylelint stylelint-config-standard
          stylelint "frontend/**/*.css" || true

  # =========================
  # Build Lambda Packages
  # =========================
  build:
    runs-on: ubuntu-latest
    needs: backend-tests
    strategy:
      matrix:
        service:
          - auth_service
          - cart_service
          - payment_service
          - product_service

    steps:
      - uses: actions/checkout@v4

      - name: Build Package
        run: |
          mkdir -p build/${{ matrix.service }}
          cp -r backend/manohari_tf_${{ matrix.service }}/* build/${{ matrix.service }}/
          cd build/${{ matrix.service }}
          zip -r ../../${{ matrix.service }}.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}
          path: ${{ matrix.service }}.zip