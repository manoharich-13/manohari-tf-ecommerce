name: Python CI Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:

  # 🔹 Product Service
  product-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install & Test Product Service
        working-directory: backend/manohari_tf_product_service
        run: |
          pip install -r ../../manohari-tf-tests/unit/requirements.txt
          pytest ../../manohari-tf-tests/unit/test_product.py

  # 🔹 Cart Service
  cart-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install & Test Cart Service
        working-directory: backend/manohari_tf_cart_service
        run: |
          pip install -r ../../manohari-tf-tests/unit/requirements.txt
          pytest ../../manohari-tf-tests/unit/test_cart.py

  # 🔹 Payment Service
  payment-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install & Test Payment Service
        working-directory: backend/manohari_tf_payment_service
        run: |
            pip install -r ../../manohari-tf-tests/unit/requirements.txt
            pytest ../../manohari-tf-tests/unit/test_payment.py
